name: V1 CI

on:
  push:
    branches: [master]
    paths:
      - "v1/**"
      - ".github/workflows/v1-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "v1/**"
      - ".github/workflows/v1-ci.yml"

jobs:
  test:
    name: Test V1
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./v1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "v1/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v1-build-files
          path: v1/.nuxt/
          retention-days: 7
